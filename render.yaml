services:
  - type: web
    name: varyn-agent
    runtime: python
    rootDir: agent
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FRONTEND_URL
        value: https://varyn-ai.vercel.app
      - key: VARYN_SECURITY_REQUIRED
        value: "true"
      - key: VARYN_PROXY_SECRET
        sync: false
