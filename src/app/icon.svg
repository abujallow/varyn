<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Varyn orbital core mark">
  <defs>
    <radialGradient id="core" cx="50%" cy="42%" r="58%">
      <stop offset="0" stop-color="#294766"/>
      <stop offset="0.38" stop-color="#10243d"/>
      <stop offset="0.72" stop-color="#050b14"/>
      <stop offset="1" stop-color="#010205"/>
    </radialGradient>
    <linearGradient id="ring" x1="30" y1="32" x2="222" y2="226" gradientUnits="userSpaceOnUse">
      <stop stop-color="#e8eef7"/>
      <stop offset="0.42" stop-color="#8099bb"/>
      <stop offset="1" stop-color="#42658f"/>
    </linearGradient>
    <filter id="glow" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
