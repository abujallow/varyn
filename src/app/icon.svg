  <circle cx="128" cy="128" r="77" fill="none" stroke="#8099bb" stroke-opacity="0.58" stroke-width="4"/>
  <circle cx="128" cy="128" r="77" fill="none" stroke="#e8eef7" stroke-opacity="0.86" stroke-width="5" stroke-linecap="round" stroke-dasharray="68 416" transform="rotate(118 128 128)"/>
  <circle cx="128" cy="128" r="51" fill="url(#core)" stroke="#8fa7c7" stroke-opacity="0.88" stroke-width="4" filter="url(#glow)"/>
  <circle cx="128" cy="128" r="32" fill="#02050a" fill-opacity="0.66"/>
</svg>
